# 基于 `wrangler pages download config` 结果整理：请勿把 GITHUB_TOKEN 写入本文件。
# 机密请在 Cloudflare Pages → 变量和机密 → 「机密」添加，或：npx wrangler pages secret put GITHUB_TOKEN --project-name=personal-pan-linkedgithub
#
name = "personal-pan-linkedgithub"
pages_build_output_dir = "web/dist"
compatibility_date = "2024-10-22"

[vars]
GITHUB_OWNER = "HuiJiangOfficial"
GITHUB_REPO = "Personal_Pan_LinkedGithub"
GITHUB_BRANCH = "main"
